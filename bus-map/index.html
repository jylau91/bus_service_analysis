<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Singapore Bus Service Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sbst:  #731c7d;
      --smrt:  #C8102E;
      --gas:   #E87722;
      --tts:   #2E8B57;
      --bg:    #1a1d23;
      --panel: #22252e;
      --card:  #2b2f3a;
      --border:#3a3f4e;
      --text:  #e8eaf0;
      --muted: #8891a8;
      --accent:#4a90d9;
    }

    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

    /* ── HEADER ─────────────────────────────────────────── */
    #header {
      display: flex; align-items: center; flex-wrap: wrap; gap: 10px;
      padding: 12px 16px; background: var(--panel);
      border-bottom: 1px solid var(--border); z-index: 1000; position: relative;
    }
    #header h1 { font-size: 1rem; font-weight: 700; white-space: nowrap; letter-spacing: 0.3px; }
    #header h1 span { color: var(--accent); }

    .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; flex: 1; }

    .btn {
      padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--card); color: var(--text); font-size: 0.82rem;
      cursor: pointer; white-space: nowrap; transition: background 0.15s, border-color 0.15s;
    }
    .btn:hover { background: #363b4a; border-color: var(--accent); }
    .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    select, input[type="text"] {
      padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--card); color: var(--text); font-size: 0.82rem;
      outline: none; cursor: pointer;
    }
    select:focus, input:focus { border-color: var(--accent); }

    #search { min-width: 130px; }

    /* ── MAP ──────────────────────────────────────────────── */
    #map-container { transition: height 0.3s ease; overflow: hidden; }
    #map-container.collapsed { height: 0 !important; }
    #map { width: 100%; height: 100%; }

    /* ── LEGEND ───────────────────────────────────────────── */
    #legend {
      display: flex; flex-wrap: wrap; gap: 8px 16px;
      padding: 8px 16px; background: var(--panel);
      border-top: 1px solid var(--border); font-size: 0.78rem;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-swatch { width: 22px; height: 4px; border-radius: 2px; }
    .legend-label { color: var(--muted); }
    #stats { margin-left: auto; color: var(--muted); font-size: 0.78rem; white-space: nowrap; }

    /* ── LOADING OVERLAY ──────────────────────────────────── */
    #overlay {
      position: fixed; inset: 0; background: rgba(20,22,30,0.97);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; z-index: 9999; gap: 20px;
    }
    #overlay h2 { font-size: 1.25rem; color: var(--text); }
    #progress-bar-wrap {
      width: 340px; height: 8px; background: var(--border);
      border-radius: 4px; overflow: hidden;
    }
    #progress-bar { height: 100%; width: 0; background: var(--accent); transition: width 0.4s; border-radius: 4px; }
    #progress-msg { color: var(--muted); font-size: 0.85rem; max-width: 340px; text-align: center; }
    #error-msg { color: #e87; font-size: 0.82rem; max-width: 380px; text-align: center; display: none; }

    /* ── SUMMARY STATS ───────────────────────────────────── */
    #summary-section {
      padding: 24px 20px 48px;
      background: var(--bg);
    }
    #summary-section h2 {
      font-size: 0.9rem; font-weight: 700; letter-spacing: 0.4px;
      color: var(--muted); text-transform: uppercase; margin-bottom: 14px;
    }
    .summary-scroll { overflow-x: auto; }
    #summary-table {
      width: 100%; border-collapse: collapse; font-size: 0.82rem;
      min-width: 700px;
    }
    #summary-table th {
      text-align: left; padding: 8px 14px;
      border-bottom: 2px solid var(--border);
      color: var(--muted); font-weight: 600;
      white-space: nowrap; font-size: 0.76rem; text-transform: uppercase; letter-spacing: 0.3px;
    }
    #summary-table td {
      padding: 12px 14px; border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    #summary-table tbody tr:last-child td { border-bottom: none; }
    #summary-table tbody tr:hover td { background: rgba(255,255,255,0.02); }
    .op-cell { display: flex; align-items: center; gap: 10px; }
    .op-pip  { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .op-cell span { font-weight: 600; white-space: nowrap; }
    .regions-tags { display: flex; flex-wrap: wrap; gap: 4px; max-width: 280px; }
    .region-tag {
      display: inline-block; padding: 2px 7px; border-radius: 10px;
      font-size: 0.72rem; background: var(--card);
      border: 1px solid var(--border); color: var(--muted);
      white-space: nowrap;
    }
    .num-cell { font-variant-numeric: tabular-nums; }
    .sub-val  { display: block; color: var(--muted); font-size: 0.74rem; margin-top: 2px; }

    /* ── LEAFLET OVERRIDES ────────────────────────────────── */
    .leaflet-container { background: #242830; }
    .leaflet-popup-content-wrapper {
      background: var(--card); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .leaflet-popup-tip { background: var(--card); }
    .popup-title { font-weight: 700; font-size: 1rem; margin-bottom: 6px; }
    .popup-row { font-size: 0.82rem; color: var(--muted); margin: 3px 0; }
    .popup-row b { color: var(--text); }
    .op-badge {
      display: inline-block; padding: 2px 8px; border-radius: 12px;
      font-size: 0.76rem; font-weight: 600; color: #fff; margin-top: 4px;
    }
    .pkg-badge {
      display: inline-block; padding: 2px 8px; border-radius: 12px;
      font-size: 0.76rem; background: var(--border); color: var(--text); margin-top: 4px;
    }
  </style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div id="overlay">
  <h2>🚌 Singapore Bus Map</h2>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
  <div id="progress-msg">Initialising…</div>
  <div id="error-msg"></div>
</div>

<!-- HEADER -->

      <option value="TTS">Tower Transit</option>
    </select>
    <select id="filter-package"><option value="">All Packages</option></select>
    <input type="text" id="search" placeholder="Service no…" maxlength="6">
  </div>
</div>

<!-- MAP -->
<div id="map-container" style="height: calc(100vh - 96px)">

/* Build service → package lookup */
const SVC_PKG = {};
for (const [pkg, info] of Object.entries(PACKAGES)) {
  for (const svc of info.svcs) SVC_PKG[svc] = pkg;
}

/* ═══════════════════════════════════════════════════════════════
   UI HELPERS
═══════════════════════════════════════════════════════════════ */
const $overlay     = document.getElementById("overlay");
const $progressBar = document.getElementById("progress-bar");
const $progressMsg = document.getElementById("progress-msg");
const $errorMsg    = document.getElementById("error-msg");
const $stats       = document.getElementById("stats");

function setProgress(pct, msg) {
  $progressBar.style.width = pct + "%";
  $progressMsg.textContent = msg;
}

function showError(msg) {
  $errorMsg.style.display = "block";
  $errorMsg.innerHTML = msg;
}

/* ═══════════════════════════════════════════════════════════════
   DATA LOADING — static pre-generated JSON files
═══════════════════════════════════════════════════════════════ */
async function loadData() {
  // Check cache
  const ts = localStorage.getItem(CACHE_TS);
  if (ts && Date.now() - parseInt(ts) < CACHE_TTL) {
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) {
      setProgress(100, "Loading from cache…");
      const d = JSON.parse(cached);
      d._lastModified = localStorage.getItem("sgbusmap_lastmod");
      return d;
    }
  }

  // Load pre-generated static files
  setProgress(10, "Loading bus stops…");
  const fetchJSON = url => fetch(url).then(r => {
    if (!r.ok) throw new Error(`Failed to load ${url}: ${r.statusText}`);
    return r.json();
  });

  // Capture Last-Modified from bus_stops.json for the "last updated" display
  let lastModified = null;
  const stopsResp = await fetch("./data/bus_stops.json");
  if (!stopsResp.ok) throw new Error(`Failed to load bus_stops.json: ${stopsResp.statusText}`);
  lastModified = stopsResp.headers.get("Last-Modified");
  if (lastModified) {
    try { localStorage.setItem("sgbusmap_lastmod", lastModified); } catch(e) {}
  }
  const rawStops = await stopsResp.json();

  const [rawServices, rawRoutes] = await Promise.all([
    fetchJSON("./data/bus_services.json"),
    fetchJSON("./data/bus_routes.json"),
  ]);
  setProgress(80, "Processing data…");

  // stops: {StopCode: {lat, lon, desc, road}} — already correct shape
  const stops = rawStops;

  // services: adapt fetch_data.py keys → internal keys
  const services = {};
  for (const [no, s] of Object.entries(rawServices)) {
    services[no] = {
      op:     s.operator,
      opName: s.operatorName,
      cat:    s.category,
      orig1:  "",
      dest1:  "",
      pkg:    s.package,
    };
  }

  // routes: {ServiceNo: {dir: [stopCodes...]}} — already correct shape
  const routes = rawRoutes;

  const data = { stops, services, routes, _lastModified: lastModified };
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ stops, services, routes }));
    localStorage.setItem(CACHE_TS, Date.now().toString());
  } catch (e) { /* storage full — continue without cache */ }

  return data;
}

/* ═══════════════════════════════════════════════════════════════
   MAP
═══════════════════════════════════════════════════════════════ */
let map, allLayers = [], data = null;
let currentOpFilter  = "";
let currentPkgFilter = "";
let currentSearch    = "";

function initMap() {
  map = L.map("map", {
    center: [1.3521, 103.8198],
    zoom: 12,
    preferCanvas: true,  // canvas renderer — much faster for many polylines
  });

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '© <a href="https://www.openstreetmap.org/copyright" style="color:#8891a8">OpenStreetMap</a> contributors | LTA DataMall',
    maxZoom: 19,
  }).addTo(map);
}

function getOpColor(opCode) {
  return (OPERATORS[opCode] || { color: "#888" }).color;
}

function buildRouteLines(data) {
  const { stops, services, routes } = data;
  allLayers = [];

  for (const [svcNo, dirMap] of Object.entries(routes)) {
    const svcInfo = services[svcNo] || { op: "?", opName: "Unknown", cat: "", pkg: "Other" };
    const color   = getOpColor(svcInfo.op);

    for (const [dir, stopCodes] of Object.entries(dirMap)) {
      // Build LatLng array, skipping stops with no coordinates
      const latlngs = [];
      for (const code of stopCodes) {
        const s = stops[code];
        if (s && s.lat && s.lon) latlngs.push([s.lat, s.lon]);
      }
      if (latlngs.length < 2) continue;

      const startStop = stops[stopCodes[0]];
      const endStop   = stops[stopCodes[stopCodes.length - 1]];
      const from = startStop ? startStop.desc : stopCodes[0];
      const to   = endStop   ? endStop.desc   : stopCodes[stopCodes.length - 1];

      const line = L.polyline(latlngs, {
        color,
        weight: 2.5,
        opacity: 0.75,
      });

      line.bindPopup(() => {
        const pkgName = svcInfo.pkg || "Other";
        return `
          <div class="popup-title">Service ${svcNo}  <small style="color:var(--muted)">Dir ${dir}</small></div>
          <div style="margin-bottom:6px">
            <span class="op-badge" style="background:${color}">${svcInfo.opName}</span>
            <span class="pkg-badge">📦 ${pkgName}</span>
          </div>
          <div class="popup-row"><b>Category:</b> ${svcInfo.cat || "—"}</div>
          <div class="popup-row"><b>From:</b> ${from}</div>
          <div class="popup-row"><b>To:</b> ${to}</div>
          <div class="popup-row"><b>Stops:</b> ${stopCodes.length}</div>
        `;
      }, { maxWidth: 280 });

      line._svcNo  = svcNo;
      line._op     = svcInfo.op;
      line._pkg    = svcInfo.pkg;
      allLayers.push(line);
    }
  }
}

function applyFilters() {
  if (!map) return;
  const op  = currentOpFilter;
  const pkg = currentPkgFilter;
  const q   = currentSearch.toUpperCase();

  let shown = 0;
  for (const layer of allLayers) {
    const visible =
      (!op  || layer._op  === op)  &&
      (!pkg || layer._pkg === pkg) &&
      (!q   || layer._svcNo.toUpperCase().startsWith(q));

    if (visible) {
      if (!map.hasLayer(layer)) layer.addTo(map);
      shown++;
    } else {
      if (map.hasLayer(layer)) map.removeLayer(layer);
    }
  }
  $stats.textContent = `${shown.toLocaleString()} route directions shown`;
}

function populatePackageFilter(services) {
  const sel = document.getElementById("filter-package");
  const pkgs = [...new Set(Object.values(services).map(s => s.pkg))].sort();
  for (const pkg of pkgs) {
    const opt = document.createElement("option");
    opt.value = pkg;
    opt.textContent = pkg;
    sel.appendChild(opt);
  }
}

/* ═══════════════════════════════════════════════════════════════
   SUMMARY STATS
═══════════════════════════════════════════════════════════════ */
function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function buildSummaryTable(data) {
  const { stops, services, routes } = data;

  const acc = {};
  for (const code of Object.keys(OPERATORS)) {
    acc[code] = { svcs: new Set(), dirs: 0, totalStops: 0, distKm: 0, pkgs: new Set() };
  }

  for (const [svcNo, dirMap] of Object.entries(routes)) {
    const svc = services[svcNo];
    if (!svc) continue;
    const op = svc.op;
    if (!acc[op]) continue;
    acc[op].svcs.add(svcNo);
    if (svc.pkg && svc.pkg !== "Other") acc[op].pkgs.add(svc.pkg);

    // Use direction 1 only for distance (avoid double-counting)
    const dir1Codes = dirMap["1"] || dirMap[1] || Object.values(dirMap)[0] || [];
    for (let i = 0; i < dir1Codes.length - 1; i++) {
      const s1 = stops[dir1Codes[i]], s2 = stops[dir1Codes[i+1]];
      if (s1?.lat && s2?.lat) acc[op].distKm += haversineKm(s1.lat, s1.lon, s2.lat, s2.lon);
    }

    for (const codes of Object.values(dirMap)) {
      acc[op].dirs++;
      acc[op].totalStops += codes.length;
    }
  }

  const tbody = document.getElementById("summary-tbody");
  tbody.innerHTML = "";
  for (const [code, info] of Object.entries(OPERATORS)) {
    const a = acc[code];
    if (!a || a.svcs.size === 0) continue;

    const nSvcs    = a.svcs.size;
    const avgStops = a.dirs > 0 ? (a.totalStops / a.dirs).toFixed(0) : "—";
    const avgDist  = nSvcs > 0  ? (a.distKm / nSvcs).toFixed(1) : "—";
    const totalDist = Math.round(a.distKm).toLocaleString();
    const tags = [...a.pkgs].sort().map(p =>
      `<span class="region-tag">${p}</span>`).join("") || '<span class="region-tag" style="font-style:italic">—</span>';

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><div class="op-cell">
        <div class="op-pip" style="background:${info.color}"></div>
        <span>${info.name}</span>
      </div></td>
      <td class="num-cell">${nSvcs}</td>
      <td class="num-cell">${a.dirs}</td>
      <td><div class="regions-tags">${tags}</div></td>
      <td class="num-cell">${avgStops} stops</td>
      <td class="num-cell">${avgDist} km<span class="sub-val">dir 1 avg per service</span></td>
      <td class="num-cell">${totalDist} km<span class="sub-val">sum of dir 1 routes</span></td>
    `;
    tbody.appendChild(tr);
  }
}

/* ═══════════════════════════════════════════════════════════════
   MAIN
═══════════════════════════════════════════════════════════════ */
async function main() {
  initMap();

  try {
    data = await loadData();
  } catch (err) {
    console.error(err);
    showError(
      `<b>Error loading data:</b> ${err.message}<br>
       <small>The data files (bus_stops.json, bus_services.json, bus_routes.json) may be missing.<br>
       Run <code>python3 fetch_data.py --key YOUR_KEY</code> locally and commit the generated files.</small>`
    );
    return;
  }

  setProgress(95, "Rendering map…");
  buildRouteLines(data);
  populatePackageFilter(data.services);
  applyFilters();

  const nSvcs  = Object.keys(data.services).length;
  const nStops = Object.keys(data.stops).length;
  $stats.textContent = `${allLayers.length.toLocaleString()} route directions | ${nSvcs} services | ${nStops.toLocaleString()} stops`;

  // Last updated date
  const lm = data._lastModified || localStorage.getItem("sgbusmap_lastmod");
  if (lm) {
    const d = new Date(lm);
    const fmt = d.toLocaleDateString("en-SG", { day: "numeric", month: "short", year: "numeric" });
    document.getElementById("last-updated").textContent = `Data as of ${fmt}`;
  }

  setProgress(100, "Done");
  $overlay.style.display = "none";

  buildSummaryTable(data);

  // ── Event listeners ──────────────────────────────────────
  document.getElementById("filter-operator").addEventListener("change", e => {
    currentOpFilter = e.target.value; applyFilters();
  });
  document.getElementById("filter-package").addEventListener("change", e => {
    currentPkgFilter = e.target.value; applyFilters();
  });
  document.getElementById("search").addEventListener("input", e => {
    currentSearch = e.target.value.trim(); applyFilters();
  });

  // ── Map toggle ───────────────────────────────────────────
  const btnToggle = document.getElementById("btn-toggle-map");
  const mapCont   = document.getElementById("map-container");
  btnToggle.addEventListener("click", () => {
    const collapsed = mapCont.classList.toggle("collapsed");
    btnToggle.textContent = collapsed ? "▼ Show Map" : "▲ Hide Map";
    btnToggle.classList.toggle("active", !collapsed);
    if (!collapsed) setTimeout(() => map.invalidateSize(), 320);
  });
}

main();
</script>
</body>
</html>
